<!-- BOOKING FORM -->

<div class="booking-section">

<h3>Book a Session</h3>

<p>
Fill out the form below and your booking details
will be sent directly to my email.
</p>


<form
action="https://formsubmit.co/ramilnocalan7@gmail.com"
method="POST"
class="contact-form">


<input
type="text"
name="Full Name"
placeholder="Full Name"
required>


<input
type="email"
name="Email"
placeholder="Email Address"
required>


<input
type="text"
name="Type of Shoot"
placeholder="Type of Shoot (Wedding, Portrait, Events...)"
required>


<input
type="date"
name="Preferred Date"
required>


<textarea
name="Vision"
placeholder="Tell me about your vision..."
required>
</textarea>


<input
type="hidden"
name="_subject"
value="New Booking Request - Rams Photography">


<input
type="hidden"
name="_captcha"
value="false">


<input
type="hidden"
name="_template"
value="table">


<button
type="submit"
class="btn">

Send Booking Request

</button>

</form>

</div>
