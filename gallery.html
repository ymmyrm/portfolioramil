<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="images/favicon.jpg">
  <link rel="stylesheet" href="style.css">

  
</head>
<body>

<header>
  <nav class="navbar">
    <a class="logo" >
      <img src="images/favicon.jpg" alt="Rams Photography Logo" class="logo-icon">
      <h1 class="logo">

RAMS<span>.</span>

</h1>
    </a>

    <button class="burger" id="burger" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="booking.html">Booking</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="Ramil_Nocalan_CV.pdf" download>CV</a></li>
    </ul>
  </nav>
</header>

<section class="gallery">
  <div class="section-title">
    <p>PORTFOLIO</p>
    <h2>Gallery</h2>
  </div>

  <div class="gallery-grid">
    <div class="card"><img src="images/1.jpeg" alt="Photo 1"></div>
    <div class="card"><img src="images/2.jpeg" alt="Photo 2"></div>
    <div class="card"><img src="images/3.jpeg" alt="Photo 3"></div>
    <div class="card"><img src="images/4.jpeg" alt="Photo 4"></div>
    <div class="card"><img src="images/5.jpeg" alt="Photo 5"></div>
    <div class="card"><img src="images/6.jpeg" alt="Photo 6"></div>
    <div class="card"><img src="images/7.jpeg" alt="Photo 7"></div>
    <div class="card"><img src="images/8.jpeg" alt="Photo 8"></div>
    <div class="card"><img src="images/9.jpeg" alt="Photo 9"></div>
    
    <div class="card"><img src="images/11.jfif" alt="Photo 11"></div>
  </div>
</section>

<!-- Lightbox -->
<div id="imageModal" class="modal">
  <button class="modal-close" id="modalClose" aria-label="Close">&#10005;</button>
  <button class="modal-prev" id="modalPrev" aria-label="Previous">&#8592;</button>
  <img class="modal-content" id="fullImage" alt="">
  <button class="modal-next" id="modalNext" aria-label="Next">&#8594;</button>
  <div class="modal-counter" id="modalCounter"></div>
</div>

<footer>
  <div class="footer-content">
    <p>
      © 2026
      <a href="https://www.instagram.com/filmedbyram_" style="color:inherit; text-decoration:none;">
        Rams Photography
      </a>. All rights reserved.
    </p>
  </div>
</footer>

<script>
  // ── Burger menu ──
  const burger   = document.getElementById('burger');
  const navLinks = document.getElementById('nav-links');

  burger.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    burger.classList.toggle('open', isOpen);
    burger.setAttribute('aria-expanded', isOpen);
  });

  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
      burger.classList.remove('open');
      burger.setAttribute('aria-expanded', false);
    });
  });

  // ── Lightbox ──
  const modal      = document.getElementById('imageModal');
  const fullImage  = document.getElementById('fullImage');
  const closeBtn   = document.getElementById('modalClose');
  const prevBtn    = document.getElementById('modalPrev');
  const nextBtn    = document.getElementById('modalNext');
  const counter    = document.getElementById('modalCounter');

  const images = Array.from(document.querySelectorAll('.gallery-grid .card img'));
  let current  = 0;

  function openModal(index) {
    current = index;
    fullImage.src = images[current].src;
    fullImage.alt = images[current].alt;
    counter.textContent = `${current + 1} / ${images.length}`;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }

  function showPrev() {
    current = (current - 1 + images.length) % images.length;
    openModal(current);
  }

  function showNext() {
    current = (current + 1) % images.length;
    openModal(current);
  }

  // Open on card click
  images.forEach((img, i) => {
    img.parentElement.addEventListener('click', () => openModal(i));
  });

  closeBtn.addEventListener('click', closeModal);
  prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
  nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });

  // Click outside image to close
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (modal.style.display !== 'flex') return;
    if (e.key === 'ArrowLeft')  showPrev();
    if (e.key === 'ArrowRight') showNext();
    if (e.key === 'Escape')     closeModal();
  });
</script>

</body>
</html>
